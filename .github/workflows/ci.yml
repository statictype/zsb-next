name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. force-push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, secret-free gate: lint, formatting, and the unit + component tests
  # (Vitest supplies dummy Sanity env in vitest.config.ts). Types are checked by
  # `next build` in the job below — a standalone `tsc` can't, because the route
  # types it needs (PageProps etc.) are generated by Next, not present on a
  # fresh checkout.
  check:
    name: Lint · Format · Unit + Component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test

  # Production build (also the canonical type-check — `next build` fails on any
  # TS error) + Playwright smoke. Reads the Sanity env from secrets; the
  # webServer in playwright.config.ts only `pnpm start`s in CI, so the build is
  # its prerequisite.
  build-e2e:
    name: Build (typecheck) · E2E smoke
    runs-on: ubuntu-latest
    needs: check
    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
      SANITY_API_READ_TOKEN: ${{ secrets.SANITY_API_READ_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: it's the type gate, so a type error fails here before the
      # ~150 MB browser download.
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
